<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página de Login</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
  <script src="script.js" defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cascadia+Mono:ital,wght@0,200..700;1,200..700&family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="login-container" data-container="login">
    <div class="form-container sign-up">
      <form>
        <h1>Crie sua conta</h1>
        <input type="text" name="fullName" placeholder="Nome" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Senha" required>
        <button class="btn" data-register>Cadastrar</button>
      </form>
    </div>
    <div class="form-container sign-in">
      <form>
        <h1>Login</h1>
        <input type="text" name="username" placeholder="Usuário" required>
        <input type="password" name="password" placeholder="Senha" required>
        <button class="btn" data-login>Entrar</button>
        <a href="#" class="forgot-password">Esqueceu sua senha?</a>
        <button class="social">
          <span><i class="fa-brands fa-google"></i></span> Entrar com o Google
        </button>
        <p class="mobile">Ainda não possui conta? <span><a href="#">Cadastre-se</a></span></p>
      </form>  
    </div>
    <div class="toggle-container">
      <div class="toggle">
        <div class="toggle-panel toggle-left">
          <h1>Bem vindo de volta!</h1>
          <p>Acesse sua conta para usar todas as ferramentas do site</p>
          <button class="btn hidden" data-login>Entrar</button>
        </div>
        <div class="toggle-panel toggle-right">
          <h1>Bem vindo!</h1>
          <p>Crie sua conta para ter acesso a todas as ferramentas do site</p>
          <button class="btn hidden" data-register>Cadastrar</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
